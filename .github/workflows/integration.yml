name: Integration Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run integration tests daily at 6:00 UTC
    - cron: '0 6 * * *'

jobs:
  mcp-integration:
    name: MCP Protocol Integration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        working-directory: ./packages/mcp-server
        run: npm ci
      
      - name: Build
        working-directory: ./packages/mcp-server
        run: npm run build
      
      - name: Test MCP server startup
        run: |
          cd packages/mcp-server
          timeout 5s node dist/index.js || [ $? -eq 124 ] && echo "✅ MCP server starts successfully"
      
      - name: Test HTTP server
        run: |
          cd packages/mcp-server
          node dist/http-fast.js &
          SERVER_PID=$!
          sleep 3
          
          # Test health endpoint
          curl -f http://localhost:3333/health || exit 1
          echo "✅ HTTP server responding"
          
          kill $SERVER_PID || true

  sqlite-integration:
    name: SQLite Database Integration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        working-directory: ./packages/mcp-server
        run: npm ci
      
      - name: Build
        working-directory: ./packages/mcp-server
        run: npm run build
      
      - name: Test SQLite operations
        run: |
          cat > test-sqlite.js << 'EOF'
          const Database = require('better-sqlite3');
          const fs = require('fs');
          
          console.log('🐉 Testing SQLite Integration\n');
          
          const dbPath = './test-wyrm.db';
          const db = new Database(dbPath);
          
          // Test table creation
          db.exec(`
            CREATE TABLE IF NOT EXISTS sessions (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              data TEXT NOT NULL,
              timestamp INTEGER NOT NULL
            );
            CREATE VIRTUAL TABLE IF NOT EXISTS sessions_fts USING fts5(content);
          `);
          console.log('✅ Tables created');
          
          // Test insert
          const insert = db.prepare('INSERT INTO sessions (data, timestamp) VALUES (?, ?)');
          insert.run(JSON.stringify({ test: 'integration' }), Date.now());
          console.log('✅ Insert successful');
          
          // Test select
          const select = db.prepare('SELECT * FROM sessions');
          const rows = select.all();
          if (rows.length !== 1) throw new Error('Select failed');
          console.log('✅ Select successful');
          
          // Test FTS
          const ftsInsert = db.prepare('INSERT INTO sessions_fts (content) VALUES (?)');
          ftsInsert.run('This is a test document for full-text search');
          const ftsSearch = db.prepare('SELECT * FROM sessions_fts WHERE content MATCH ?');
          const ftsRows = ftsSearch.all('test');
          if (ftsRows.length !== 1) throw new Error('FTS failed');
          console.log('✅ FTS successful');
          
          db.close();
          fs.unlinkSync(dbPath);
          
          console.log('\n✅ All SQLite integration tests passed');
          EOF
          
          cd packages/mcp-server
          node ../../test-sqlite.js

  cross-platform:
    name: Cross-Platform Test
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['18.x', '20.x']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      
      - name: Install dependencies
        working-directory: ./packages/mcp-server
        run: npm ci
      
      - name: Build
        working-directory: ./packages/mcp-server
        run: npm run build
      
      - name: Test CLI binaries (Unix)
        if: runner.os != 'Windows'
        working-directory: ./packages/mcp-server
        run: |
          node dist/index.js --help || echo "CLI help works"
          node dist/http-fast.js --help || echo "HTTP CLI works"
      
      - name: Test CLI binaries (Windows)
        if: runner.os == 'Windows'
        working-directory: ./packages/mcp-server
        run: |
          node dist/index.js --help
          node dist/http-fast.js --help
        shell: pwsh
      
      - name: Platform report
        run: |
          echo "✅ Build successful on ${{ matrix.os }} with Node.js ${{ matrix.node }}"

  install-deployment:
    name: Test Install & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create test projects
        run: |
          mkdir -p test-workspace/project-1
          mkdir -p test-workspace/project-2
          
          cd test-workspace/project-1
          git init
          git config user.email "test@ghosts.lk"
          git config user.name "Test User"
          echo "# Project 1" > README.md
          git add .
          git commit -m "Initial commit"
          
          cd ../project-2
          git init
          git config user.email "test@ghosts.lk"
          git config user.name "Test User"
          echo "# Project 2" > README.md
          git add .
          git commit -m "Initial commit"
      
      - name: Test individual install
        run: |
          cd test-workspace/project-1
          bash ../../install.sh
          
          # Verify installation
          test -d .wyrm || exit 1
          test -f .wyrm/hoard.md || exit 1
          grep -q "project-1" .wyrm/hoard.md || exit 1
          echo "✅ Individual install successful"
      
      - name: Test workspace scan (mock)
        run: |
          find test-workspace -name ".git" -type d | wc -l | grep -q "2" || exit 1
          echo "✅ Workspace scan would find 2 projects"
      
      - name: Verify templates
        run: |
          cd test-workspace/project-1/.wyrm
          test -f hoard.md || exit 1
          test -f chronicles.md || exit 1
          test -f quests.md || exit 1
          test -f protocol.md || exit 1
          echo "✅ All templates present"
