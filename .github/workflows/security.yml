name: Security

on:
  schedule:
    # Run security checks every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    
    strategy:
      matrix:
        language: [ 'javascript', 'typescript' ]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Audit MCP Server
        working-directory: ./packages/mcp-server
        run: |
          npm audit --audit-level=moderate || true
          npm audit --json > ../../audit-mcp.json || true
      
      - name: Audit VS Code Extension
        working-directory: ./packages/vscode-extension
        run: |
          npm audit --audit-level=moderate || true
          npm audit --json > ../../audit-vscode.json || true
      
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            audit-mcp.json
            audit-vscode.json
          retention-days: 30

  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install license checker
        run: npm install -g license-checker
      
      - name: Check licenses (MCP Server)
        working-directory: ./packages/mcp-server
        run: |
          npm ci
          license-checker --summary > ../../mcp-licenses.txt || true
      
      - name: Check licenses (VS Code Extension)
        working-directory: ./packages/vscode-extension
        run: |
          npm ci || true
          license-checker --summary > ../../vscode-licenses.txt || true
      
      - name: Upload license reports
        uses: actions/upload-artifact@v4
        with:
          name: license-reports
          path: |
            mcp-licenses.txt
            vscode-licenses.txt
          retention-days: 30
