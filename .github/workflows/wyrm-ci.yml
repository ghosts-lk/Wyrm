name: Wyrm MCP Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Daily build at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # BUILD & TEST
  # ============================================
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci
        
      - name: 🔍 Lint
        run: npm run lint --if-present
        
      - name: 🧪 Type check
        run: npm run type-check --if-present
        
      - name: 🔨 Build
        run: npm run build
        
      - name: 📋 Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        
      - name: 📤 Upload build
        uses: actions/upload-artifact@v4
        with:
          name: wyrm-build-${{ github.sha }}
          path: |
            packages/*/dist/
          retention-days: 7

  # ============================================
  # INTEGRATION TEST
  # ============================================
  integration:
    name: 🔗 Integration Test
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci
        
      - name: 🔗 Test MCP server startup
        run: |
          npm run build
          timeout 10s npm run start -- --help || true
          echo "✅ MCP server starts successfully"

  # ============================================
  # PUBLISH (on release)
  # ============================================
  publish:
    name: 📦 Publish
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ghosts-protocol-pvt-ltd'
          
      - name: 📚 Install dependencies
        run: npm ci
        
      - name: 🔨 Build
        run: npm run build
        
      - name: 📦 Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================
  # REPORT
  # ============================================
  report:
    name: 📊 Report
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: always()
    
    steps:
      - name: 📊 Generate report
        run: |
          cat > report.md << EOF
          # Wyrm Build Report
          
          **Date:** $(date -u)
          **Version:** ${{ needs.build.outputs.version }}
          **Commit:** ${{ github.sha }}
          
          ## Results
          - Build: ${{ needs.build.result }}
          - Integration: ${{ needs.integration.result }}
          
          ---
          *Wyrm MCP Server - Ghost Protocol*
          EOF
          cat report.md
